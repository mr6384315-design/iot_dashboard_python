<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard IoT</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #f5f7fa, #dfe9f3);
        }

        .dashboard{
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,0.1);
            text-align:center;
            width:350px;
        }

        h1{
            color:#333;
            margin-bottom:25px;
            font-size:28px;
        }

        .card{
            background:#f8fafc;
            padding:20px;
            margin:15px 0;
            border-radius:15px;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.05);
        }

        .valor{
            font-size:40px;
            font-weight:bold;
            color:#2563eb;
        }

        .label{
            font-size:18px;
            color:#555;
            margin-top:5px;
        }

        .fecha{
            margin-top:20px;
            color:#666;
            font-size:14px;
        }
    </style>
</head>

<body>

    <div class="dashboard">
        <h1>🌤 Dashboard IoT</h1>

        <div class="card">
            <div class="valor" id="temperatura">--</div>
            <div class="label">Temperatura °C</div>
        </div>

        <div class="card">
            <div class="valor" id="humedad">--</div>
            <div class="label">Humedad %</div>
        </div>

        <p class="fecha">
            Última actualización:<br>
            <span id="fecha">--</span>
        </p>
    </div>

    <script>
        fetch("datos.json")
            .then(respuesta => respuesta.json())
            .then(datos => {
                document.getElementById("temperatura").textContent = datos.temperatura;
                document.getElementById("humedad").textContent = datos.humedad;
                document.getElementById("fecha").textContent = datos.fecha_hora;
            })
            .catch(error => {
                console.error("Error al cargar datos:", error);
            });
    </script>

</body>
</html>
